<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - AgriTech</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin-global.css">
    <style>
        body {
            background-color: #F8FAFC;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 400px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header h1 {
            color: var(--primary);
            font-size: 24px;
            margin: 0 0 8px 0;
        }
        .login-header p {
            color: var(--text-muted);
            font-size: 14px;
            margin: 0;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
        }
        .form-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-login:hover {
            background: #059669;
        }
        .error-message {
            color: var(--danger);
            font-size: 13px;
            margin-top: 12px;
            text-align: center;
            display: none;
        }
    </style>
    <script src="js/rbac.js"></script>
</head>
<body>

    <div class="login-card">
        <div class="login-header">
            <h1>AgriTech Admin</h1>
            <p>লগিন করে ড্যাশবোর্ডে প্রবেশ করুন</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label class="form-label">ইমেইল ঠিকানা</label>
                <input type="email" id="email" class="form-input" placeholder="admin@example.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">পাসওয়ার্ড</label>
                <input type="password" id="password" class="form-input" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">লগিন করুন</button>
            <div id="errorMessage" class="error-message"></div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('errorMessage');
            
            errorDiv.style.display = 'none';
            btn.textContent = 'লগিন হচ্ছে...';
            btn.disabled = true;

            try {
                // Dynamically route to local worker if testing on localhost, else point to live APIs
                const isLocal = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost';
                const API_URL = isLocal 
                    ? 'http://127.0.0.1:8787/api/admin/login' 
                    : 'https://agritech-backend.mobashwir9.workers.dev/api/admin/login';

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Save JWT and user info
                    localStorage.setItem('agritech_admin_token', data.token);
                    localStorage.setItem('agritech_admin_user', JSON.stringify(data.user));
                    
                    // Redirect to dashboard
                    window.location.href = 'index.html';
                } else {
                    errorDiv.textContent = data.error || 'লগিন ব্যর্থ হয়েছে। ইমেইল বা পাসওয়ার্ড ভুল।';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                console.error('Login error:', error);
                errorDiv.textContent = 'সার্ভারের সাথে কানেক্ট করা যাচ্ছে না। দয়া করে আবার চেষ্টা করুন।';
                errorDiv.style.display = 'block';
            } finally {
                btn.textContent = 'লগিন করুন';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
