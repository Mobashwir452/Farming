<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - AgriTech SaaS</title>
    <link rel="stylesheet" href="css/admin-global.css">
    <link rel="stylesheet" href="css/admin-login.css">
</head>
<body class="login-body">

    <div class="login-card">
        <div class="login-logo">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                <path d="M2 17l10 5 10-5"></path>
                <path d="M2 12l10 5 10-5"></path>
            </svg>
        </div>
        <h2 style="font-size: 24px; font-weight: 700; color: var(--text-main); margin-bottom: 8px;">AgriTech Admin</h2>
        <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 32px;">SaaS ড্যাশবোর্ডে লগইন করুন</p>

        <form onsubmit="handleLogin(event)">
            <div class="input-group">
                <label>অ্যাডমিন ইমেইল</label>
                <input type="email" class="form-input" placeholder="admin@agritech.com" required>
            </div>
            <div class="input-group">
                <label>পাসওয়ার্ড / পিন</label>
                <input type="password" class="form-input" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; padding: 12px; font-size: 16px; margin-top: 8px;">
                লগইন করুন
            </button>
        </form>
    </div>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            // Mock authentication success
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
