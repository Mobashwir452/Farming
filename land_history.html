<!DOCTYPE html>
<html lang="bn">

<head>
    <script src="js/auth-guard.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>জমির ইতিহাস - AgriTech System</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/land_details.css"> <!-- Reusing top-header styling -->
    <link rel="stylesheet" href="css/land_history.css">

    <!-- Web Components & Modules -->
    <script type="module" src="js/components.js" defer></script>
    <script type="module" src="js/land_history.js" defer></script>
</head>

<body class="land-history-body">

    <!-- Content Wrapper -->
    <main class="land-details-wrapper">

        <!-- Top Navigation Header -->
        <div class="page-top-header" style="justify-content: space-between; align-items: center; padding-right: 16px;">
            <div style="display: flex; align-items: center; gap: 8px;">
                <button class="back-btn" onclick="window.history.back()" aria-label="Go Back">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                </button>
                <h2>জমির ইতিহাস</h2>
            </div>
            <div class="weather-widget">
                <span class="weather-icon">☀️</span>
                <span class="weather-temp">৩২°</span>
            </div>
        </div>

        <div class="lh-container">

            <!-- 1. All-Time Summary Card -->
            <div class="lh-summary-card">
                <div class="lh-summary-header">
                    <h3 id="summary-land-title">সম্পূর্ণ সারসংক্ষেপ</h3>
                </div>

                <div class="lh-summary-grid">
                    <div class="lh-summary-item">
                        <div class="lh-icon-box classic-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
                        </div>
                        <div class="lh-summary-text">
                            <span class="lh-summary-label">মোট ফসল</span>
                            <span class="lh-summary-value" id="summary-total-crops">০ টি</span>
                        </div>
                    </div>
                    
                    <div class="lh-summary-item">
                        <div class="lh-icon-box classic-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                        </div>
                        <div class="lh-summary-text">
                            <span class="lh-summary-label">বিনিয়োগ</span>
                            <span class="lh-summary-value" id="summary-total-investment">৳ ০</span>
                        </div>
                    </div>

                    <div class="lh-summary-item">
                        <div class="lh-icon-box classic-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>
                        </div>
                        <div class="lh-summary-text">
                            <span class="lh-summary-label">সর্বমোট আয়</span>
                            <span class="lh-summary-value" id="summary-total-revenue">৳ ০</span>
                        </div>
                    </div>

                    <div class="lh-summary-item net-profit-item">
                        <div class="lh-icon-box classic-icon profit-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>
                        </div>
                        <div class="lh-summary-text">
                            <span class="lh-summary-label" style="color: var(--primary-dark);">নিট প্রফিট</span>
                            <span class="lh-summary-value" id="summary-net-profit" style="color: var(--primary-dark);">৳ ০</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 2. Crop History List -->
            <div class="lh-history-list">
                <div class="lh-history-list-header">
                    <h3>অতীত ফসলের বিবরণ</h3>
                </div>

            </div>

        </div>

    </main>

    <!-- Bottom Navigation -->
    <app-bottom-nav></app-bottom-nav>

</body>

</html>
