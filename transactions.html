<!DOCTYPE html>
<html lang="bn">

<head>
    <script src="js/auth-guard.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AgriTech - লেনদেন</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Hind+Siliguri:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/transactions.css">

    <!-- Web Components & Modules -->
    <script type="module" src="js/components.js" defer></script>
    <script type="module" src="js/transactions.js" defer></script>
</head>

<body class="transactions-body">

    <!-- Fixed Header specific to inner scroll view -->
    <header class="inner-header">
        <button class="btn-back" onclick="window.history.back()" aria-label="Go back">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
        </button>
        <h1>সকল লেনদেন</h1>
    </header>

    <!-- Content Area -->
    <main class="transactions-content">

        <!-- UX: Navigation to Ledger / Hishab Page -->
        <div style="padding: 16px; padding-bottom: 4px;">
            <div style="background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); border-radius: 16px; padding: 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer;"
                onclick="window.location.href='hishab.html'">
                <div>
                    <h4 style="font-size: 15px; font-weight: 700; color: var(--primary-dark); margin-bottom: 4px;">
                        বিস্তারিত হিসাব খাতা</h4>
                    <p style="font-size: 12px; color: var(--text-muted);">মাসিক রিপোর্ট ও অন্যান্য খাতা</p>
                </div>
                <div
                    style="background: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); color: var(--primary);">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </div>
            </div>
        </div>

        <div class="transaction-tabs">
            <button class="tab-btn active" data-tab="all">সকল</button>
            <button class="tab-btn" data-tab="income">আয়</button>
            <button class="tab-btn" data-tab="expense">ব্যয়</button>
        </div>

        <section class="transactions-container" style="margin-top: 20px;">
            <div class="transaction-item">
                <div class="tr-icon expense">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <polyline points="19 12 12 19 5 12"></polyline>
                    </svg>
                </div>
                <div class="tr-info">
                    <h4>ইউরিয়া সার ক্রয়</h4>
                    <p>আজ দুপুর ১২:৩০</p>
                </div>
                <div class="tr-amount negative">- ৳ ৮৫০</div>
            </div>

            <div class="transaction-item">
                <div class="tr-icon income">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="19" x2="12" y2="5"></line>
                        <polyline points="5 12 12 5 19 12"></polyline>
                    </svg>
                </div>
                <div class="tr-info">
                    <h4>টমেটো বিক্রয়</h4>
                    <p>গতকাল বিকেল ০৪:১৫</p>
                </div>
                <div class="tr-amount positive">+ ৳ ৩,২০০</div>
            </div>

            <div class="transaction-item">
                <div class="tr-icon expense">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <polyline points="19 12 12 19 5 12"></polyline>
                    </svg>
                </div>
                <div class="tr-info">
                    <h4>কীটনাশক ক্রয়</h4>
                    <p>২০ মার্চ, সকাল ১০:০০</p>
                </div>
                <div class="tr-amount negative">- ৳ ৫০০</div>
            </div>

            <div class="transaction-item">
                <div class="tr-icon income">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="19" x2="12" y2="5"></line>
                        <polyline points="5 12 12 5 19 12"></polyline>
                    </svg>
                </div>
                <div class="tr-info">
                    <h4>সরকারি ভর্তুকি প্রাপ্তি</h4>
                    <p>১৫ মার্চ, দুপুর ০১:২০</p>
                </div>
                <div class="tr-amount positive">+ ৳ ২,০০০</div>
            </div>

            <!-- Empty State -->
            <div id="tr-empty-state" class="empty-state"
                style="display: none; text-align: center; padding: 60px 20px; color: #94A3B8;">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                    stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 16px; opacity: 0.5;">
                    <rect x="2" y="5" width="20" height="14" rx="2"></rect>
                    <line x1="2" y1="10" x2="22" y2="10"></line>
                </svg>
                <p style="font-size: 14px; font-weight: 500;">কোনো লেনদেন নেই</p>
            </div>
        </section>

        <!-- Floating Action Button -->
        <button class="fab-btn" aria-label="Add Transaction">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
        </button>
    </main>

    <!-- Add Transaction Bottom Sheet Modal -->
    <div class="calendar-modal" id="addTransactionModal">
        <div class="calendar-content">
            <div class="calendar-header">
                <h4>নতুন হিসাব যোগ করুন</h4>
                <button class="close-modal" id="closeAddModal" aria-label="Close modal">&times;</button>
            </div>
            <div class="calendar-body">
                <div class="input-group" style="margin-bottom: 16px;">
                    <label
                        style="display: block; font-size: 14px; font-weight: 600; color: var(--text-main); margin-bottom: 8px;">লেনদেনের
                        ধরন</label>
                    <div style="display: flex; gap: 12px;">
                        <label
                            style="flex: 1; display: flex; align-items: center; gap: 8px; padding: 12px; border: 1px solid var(--border-color); border-radius: 12px; cursor: pointer;">
                            <input type="radio" name="tr_type" value="income" checked
                                style="accent-color: var(--primary); width: 18px; height: 18px; cursor: pointer;"> আয়
                        </label>
                        <label
                            style="flex: 1; display: flex; align-items: center; gap: 8px; padding: 12px; border: 1px solid var(--border-color); border-radius: 12px; cursor: pointer;">
                            <input type="radio" name="tr_type" value="expense"
                                style="accent-color: var(--primary); width: 18px; height: 18px; cursor: pointer;"> ব্যয়
                        </label>
                    </div>
                </div>

                <div class="input-group" style="margin-bottom: 16px;">
                    <label
                        style="display: block; font-size: 14px; font-weight: 600; color: var(--text-main); margin-bottom: 8px;">ক্যাটাগরি</label>
                    <div style="position: relative;">
                        <select
                            style="width: 100%; padding: 14px; border: 1px solid var(--border-color); border-radius: 12px; font-size: 15px; outline: none; appearance: none; background: white; color: var(--text-main); font-family: inherit;">
                            <option value="seed">বীজ/চারা</option>
                            <option value="fertilizer">সার</option>
                            <option value="pesticide">কীটনাশক</option>
                            <option value="irrigation">সেচ</option>
                            <option value="labor">দিনমজুর/শ্রমিক</option>
                            <option value="transport">পরিবহন</option>
                            <option value="sales">ফসল বিক্রয়</option>
                            <option value="subsidy">ভর্তুকি</option>
                            <option value="other">অন্যান্য</option>
                        </select>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            style="position: absolute; right: 14px; top: 16px; pointer-events: none;">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                    </div>
                </div>

                <div class="input-group" style="margin-bottom: 16px;">
                    <label
                        style="display: block; font-size: 14px; font-weight: 600; color: var(--text-main); margin-bottom: 8px;">পরিমাণ
                        (৳)</label>
                    <input type="number" placeholder="0"
                        style="width: 100%; padding: 14px; border: 1px solid var(--border-color); border-radius: 12px; font-size: 16px; outline: none;">
                </div>

                <div class="input-group" style="margin-bottom: 16px;">
                    <label
                        style="display: block; font-size: 14px; font-weight: 600; color: var(--text-main); margin-bottom: 8px;">তারিখ</label>
                    <div style="position: relative;">
                        <input type="date" id="tr-date" value="2026-03-20"
                            style="width: 100%; padding: 14px; border: 1px solid var(--border-color); border-radius: 12px; font-size: 15px; outline: none; color: var(--text-main); font-family: inherit;">
                    </div>
                </div>

                <div class="input-group" style="margin-bottom: 16px;">
                    <label
                        style="display: block; font-size: 14px; font-weight: 600; color: var(--text-main); margin-bottom: 8px;">লিংকড
                        ফসল (ঐচ্ছিক)</label>
                    <div style="position: relative;">
                        <select
                            style="width: 100%; padding: 14px; border: 1px solid var(--border-color); border-radius: 12px; font-size: 15px; outline: none; appearance: none; background: white; color: var(--text-main); font-family: inherit;">
                            <option value="">কোনো ফসল সিলেক্ট করুন</option>
                            <option value="1">বোরো ধান (ব্রি-২৮)</option>
                            <option value="2">শীতকালীন টমেটো</option>
                        </select>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            style="position: absolute; right: 14px; top: 16px; pointer-events: none;">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                    </div>
                </div>

                <div class="input-group" style="margin-bottom: 24px;">
                    <label
                        style="display: block; font-size: 14px; font-weight: 600; color: var(--text-main); margin-bottom: 8px;">বিবরণ/নোট</label>
                    <input type="text" placeholder="যেমন: ইউরিয়া ২ বস্তা"
                        style="width: 100%; padding: 14px; border: 1px solid var(--border-color); border-radius: 12px; font-size: 16px; outline: none;">
                </div>
            </div>
            <div class="calendar-footer">
                <button class="btn-primary w-100" id="saveTransaction">যোগ করুন</button>
            </div>
        </div>
    </div>

    <!-- Global Layout Components -->
    <app-bottom-nav></app-bottom-nav>

</body>

</html>
