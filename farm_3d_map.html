<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Farm Tracker - AgriTech</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tiro+Bangla:ital@0;1&family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/3d_map.css">
    <style>
        :root {
            --primary: #059669;
            --surface: rgba(255, 255, 255, 0.85);
            --text-main: #0F172A;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden;
            font-family: 'Hind Siliguri', 'Inter', sans-serif;
            background: #e0f2fe; /* Light sky blue fallback */
        }
        
        #canvas-container {
            width: 100%; height: 100%;
            display: block;
        }

        /* Top Bar Overlay */
        .top-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 20px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.85) !important;
            backdrop-filter: blur(12px) !important;
            -webkit-backdrop-filter: blur(12px) !important;
            border: 1px solid rgba(255, 255, 255, 0.5) !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05) !important;
            color: var(--agri-dark) !important;
        }

        .back-btn {
            background: rgba(5, 150, 105, 0.1);
            color: var(--agri-green);
            border: none;
            width: 40px; height: 40px;
            border-radius: 10px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
        }
        .back-btn:hover { background: var(--agri-green); color: white; }
        
        .title-group h1 {
            margin: 0; font-size: 18px; font-weight: 700;
        }
        .title-group p {
            margin: 0; font-size: 12px; opacity: 0.7; font-weight: 500;
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #111827;
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            transition: opacity 0.5s ease;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <link rel="stylesheet" href="css/3d_map.css">
</head>
<body>

    <!-- Loading Screen -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
        <h2 style="margin: 0; font-size: 18px;">থ্রিডি ইঞ্জিন লোড হচ্ছে...</h2>
        <p style="margin: 8px 0 0; font-size: 14px; opacity: 0.7;">কৃষি জোন তৈরি হচ্ছে</p>
    </div>

    <!-- UI Overlay -->
    <div class="glass-panel top-bar">
        <button class="back-btn" onclick="goBack()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </button>
        <div class="title-group">
            <h1 id="headerCropName">প্রজেক্ট লোড হচ্ছে...</h1>
            <p id="headerFarmName">থ্রিডি রিয়েল-টাইম ভিউ</p>
        </div>
    </div>

    <!-- 2.5D Isometric Map Container -->
    <div class="iso-viewport">
        <div class="iso-wrapper" id="isoWrapper">
            <div id="isometric-farm-grid"></div>
        </div>
        
        <!-- Floating Edit Mode Toggle -->
        <button id="toggleEditModeBtn" class="floating-edit-btn" onclick="toggleEditMode()">
            ✏️ এডিট ম্যাপ
        </button>
    </div>

    <!-- Glassmorphic Plant Detail Sidebar -->
    <div id="plantSidebar" class="plant-sidebar">
        <div class="sidebar-header">
            <div>
                <h2 id="sbPlantTitle">গাছ: --</h2>
                <div class="health-badge" id="sbPlantStatus">স্ট্যাটাস: লোড হচ্ছে</div>
                <div style="font-size: 11px; opacity: 0.6; margin-top: 4px;" id="sbPlantLocation">--</div>
            </div>
            <button class="close-sidebar-btn" onclick="closePlantSidebar()">&times;</button>
        </div>

        <div class="health-ring-container">
            <svg viewBox="0 0 36 36" class="circular-chart green">
                <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                <path class="circle" stroke-dasharray="85, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" id="sbHealthCircle" />
                <text x="18" y="20.35" class="percentage" id="sbHealthText">85%</text>
            </svg>
            <p style="text-align: center; font-size: 12px; margin-top: 8px; opacity: 0.8;">এআই হেলথ স্কোর</p>
        </div>

        <div class="action-grid">
            <button class="action-btn" onclick="markPlantState('S')">⚠️ অসুস্থ মার্ক</button>
            <button class="action-btn" onclick="markPlantState('H')">✅ সুস্থ মার্ক</button>
            <button class="action-btn delete" onclick="deletePlant()">🗑️ ডিলিট</button>
        </div>
        
        <!-- Smart Update Info Panel (To be expanded in Phase 2) -->
        <div class="smart-info-panel" style="padding: 16px 24px; border-bottom: 1px solid rgba(0,0,0,0.05); display: none;" id="smartUpdatePanel">
            <!-- Details form will go here -->
        </div>

        <div class="timeline-container">
            <h3>ভিজ্যুয়াল টাইমলাইন</h3>
            <div id="sbTimeline" class="timeline-list">
                <!-- JS will inject timeline here -->
            </div>
            
            <div class="add-log-box">
                <input type="text" id="newLogInput" placeholder="নতুন নোট/লগ যোগ করুন...">
                <button onclick="addPlantLog()">অ্যাড</button>
            </div>
        </div>
    </div>

    <!-- Engine Logic (2.5D CSS DOM Engine) -->
    <script src="js/isometric_farm_engine.js"></script>
    <script src="js/plant_details_ui.js"></script>

    <script>
        function goBack() {
            window.history.back();
        }
    </script>
</body>
</html>
