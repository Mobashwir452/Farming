<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rajbari Green Gold: Interactive Map</title>
    <style>
        :root {
            --primary: #2d6a4f;
            --soil: #8d6e63;
            --soil-dark: #5d4037;
            --highlight: #d4e157;
            --text: #333;
            --bg: #f4f9f4;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        header {
            background: var(--primary);
            color: white;
            padding: 1rem;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 10;
        }
        h1 { margin: 0; font-size: 1.5rem; }
        h2 { margin: 5px 0 0; font-size: 0.9rem; font-weight: normal; opacity: 0.9; }

        .main-container {
            flex: 1;
            display: flex;
            position: relative;
            overflow: hidden;
        }

        /* MAP AREA */
        #map-container {
            flex: 2;
            background: #e0e0e0; /* Default background */
            position: relative;
            cursor: grab;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        canvas {
            background: #a1887f; /* Base soil color */
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            max-width: 95%;
            max-height: 95%;
        }

        /* INFO PANEL */
        #info-panel {
            flex: 0 0 320px;
            background: white;
            padding: 20px;
            border-left: 1px solid #ddd;
            overflow-y: auto;
            position: relative;
            z-index: 5;
            box-shadow: -2px 0 10px rgba(0,0,0,0.05);
        }
        .phase-badge {
            background: var(--primary);
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }
        .date_range {
            color: #666;
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 15px;
            display: block;
        }
        .task-list {
            list-style: none;
            padding: 0;
        }
        .task-list li {
            padding: 10px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: start;
        }
        .task-list li::before {
            content: '✓';
            color: var(--primary);
            margin-right: 10px;
            font-weight: bold;
        }

        /* CONTROLS (Floating) */
        .controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 30px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 60%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 20;
            backdrop-filter: blur(5px);
        }
        input[type=range] {
            width: 100%;
            margin: 10px 0;
            cursor: pointer;
        }
        .slider-labels {
            display: flex;
            justify-content: space-between;
            width: 100%;
            font-size: 0.8rem;
            color: #666;
        }
        
        .legend {
            margin-top: 20px;
            font-size: 0.85rem;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }
        .legend-item { display: flex; align-items: center; margin-bottom: 5px; }
        .color-box { width: 15px; height: 15px; margin-right: 8px; border-radius: 3px; border: 1px solid #ccc; }

        @media (max-width: 768px) {
            .main-container { flex-direction: column; }
            #info-panel { flex: 0 0 40%; order: 2; border-left: none; border-top: 1px solid #ddd; }
            #map-container { flex: 0 0 60%; order: 1; }
            .controls { width: 90%; bottom: 10px; padding: 10px 20px; }
        }
    </style>
</head>
<body>

<header>
    <h1>Rajbari Green Gold: Pepe Chash Blueprint</h1>
    <h2>Status: Land Preparation Phase (Timeline Visualization)</h2>
</header>

<div class="main-container">
    <div id="map-container">
        <!-- Canvas size: 80ft x 80ft @ 10px per ft = 800x800 -->
        <canvas id="farmMap" width="800" height="800"></canvas>
        <div class="controls">
            <div style="font-weight: bold; margin-bottom: 5px; color: var(--primary);" id="phase-title">Phase 1: Raw Land</div>
            <input type="range" id="timeSlider" min="0" max="6" step="1" value="0">
            <div class="slider-labels">
                <span>Start</span>
                <span>Plough</span>
                <span>Drain</span>
                <span>Pit</span>
                <span>Mound</span>
                <span>Plant</span>
                <span>Growth</span>
            </div>
        </div>
    </div>

    <aside id="info-panel">
        <div id="dynamic-info">
            <!-- Content will be injected by JS -->
        </div>

        <div class="legend">
            <strong>Map Legend:</strong>
            <div class="legend-item"><div class="color-box" style="background:#5d4037"></div> Ploughed Soil</div>
            <div class="legend-item"><div class="color-box" style="background:#2196f3"></div> Drain (Nala)</div>
            <div class="legend-item"><div class="color-box" style="background:black"></div> Pit (Mada - 1.5ft)</div>
            <div class="legend-item"><div class="color-box" style="background:#8d6e63; border: 2px solid #5d4037"></div> Mound (Dhibi)</div>
            <div class="legend-item"><div class="color-box" style="background:#4caf50"></div> Pepe Gach</div>
            <div class="legend-item"><div class="color-box" style="background:#c5e1a5"></div> Lal Shak (Intercrop)</div>
        </div>
    </aside>
</div>

<script>
    const canvas = document.getElementById('farmMap');
    const ctx = canvas.getContext('2d');
    const slider = document.getElementById('timeSlider');
    const phaseTitle = document.getElementById('phase-title');
    const dynamicInfo = document.getElementById('dynamic-info');

    // --- CONFIGURATION ---
    const SCALE = 10; // 10 pixels = 1 ft
    const PLOT_SIZE_FT = 80; // 80ft x 80ft plot (~6400 sq ft ~ 15 decimal)
    const GRID_SPACING_FT = 6;
    const DRAIN_WIDTH_FT = 1.5;
    const MARGIN_FT = 5; // Margin from edge

    // Calculate Grid Points
    const plants = [];
    const rows = Math.floor((PLOT_SIZE_FT - 2 * MARGIN_FT) / GRID_SPACING_FT);
    const cols = Math.floor((PLOT_SIZE_FT - 2 * MARGIN_FT) / GRID_SPACING_FT);

    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            plants.push({
                x: (MARGIN_FT + c * GRID_SPACING_FT) * SCALE,
                y: (MARGIN_FT + r * GRID_SPACING_FT) * SCALE,
                id: `R${r+1}-C${c+1}`
            });
        }
    }

    // --- PHASE DATA (From Roadmap) ---
    const phases = [
        {
            title: "Step 0: Current State (Raw Land)",
            date: "Today",
            bg: "#795548",
            tasks: [
                "Jomi Agacha purnno (Weeds everywhere)",
                "Planning phase",
                "Buying inputs (Chun, Gobor)"
            ]
        },
        {
            title: "Step 1: 1st Chash & Chun (Liming)",
            date: "Feb 16 - Feb 22",
            bg: "#5d4037", // Darker ploughed soil
            dust: true, // White lime dust
            tasks: [
                "1st Ploughing done",
                "Weeds burnt",
                "Dolomite (Chun) applied (White powder)",
                "Soil drying in sun"
            ]
        },
        {
            title: "Step 2: 2nd Chash & Drains",
            date: "Feb 23 - Feb 25",
            bg: "#4e342e", // Smooth Soil
            drains: true,
            tasks: [
                "2nd Ploughing & Leveling done",
                "1.5 ft deep Drains dug around rows",
                "Soil is flat and leveled",
                "Marking points with sticks"
            ]
        },
        {
            title: "Step 3: Mada Toiri (Pit Digging)",
            date: "Feb 26 - Feb 28",
            bg: "#4e342e",
            drains: true,
            pits: true,
            tasks: [
                "Digging 1.5 x 1.5 x 1.5 ft Pits",
                "Basal Dose (Gobor, TSP, Gypsum, Zin, Mag, Boron) mixed",
                "Sun drying the pits"
            ]
        },
        {
            title: "Step 4: Mada Vorat (Mounding)",
            date: "Mar 01 - Mar 05",
            bg: "#4e342e",
            drains: true,
            mounds: true,
            tasks: [
                "Filling pits with mixed soil",
                "Making Pyramid shaped Mounds (Dhibi)",
                "Watering to release gas",
                "Rest period"
            ]
        },
        {
            title: "Step 5: PLANTING DAY",
            date: "Mar 06 - Mar 10",
            bg: "#4e342e",
            drains: true,
            mounds: true,
            plants: true,
            tasks: [
                "Treating seedlings with Fungicide",
                "Planting Red Lady seedlings",
                "Bamboo Staking (Khuti) done",
                "Light irrigation"
            ]
        },
        {
            title: "Step 6: Intercropping & Growth",
            date: "Mar 15 onwards",
            bg: "#4e342e",
            drains: true,
            mounds: true,
            plants: true,
            intercrop: true,
            tasks: [
                "Lal Shak / Palong seeds sown in alleys",
                "Systematic Weeding (4ft clean zone)",
                "First Spray (Imidacloprid + Mancozeb)"
            ]
        }
    ];

    // --- DRAWING FUNCTIONS ---

    function drawSoil(color, hasDust) {
        ctx.fillStyle = color;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Texture
        if (hasDust) {
            ctx.fillStyle = "rgba(255, 255, 255, 0.1)"; // Lime effect
            for(let i=0; i<5000; i++) {
                ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 2, 2);
            }
        }
    }

    function drawDrains() {
        ctx.strokeStyle = "#2196f3"; // Water/Drain color
        ctx.lineWidth = DRAIN_WIDTH_FT * SCALE;
        ctx.globalAlpha = 0.6;

        // Vertical Drains (Every 2 rows maybe? or just border. Let's do simple grid drains)
        // Drawing drains between every row is too much. Let's do border drains + 1 center drain.
        
        ctx.strokeRect(0,0, canvas.width, canvas.height); // Border drain

        // Internal Drains (Between columns)
        for (let c = 0; c < cols; c++) {
             let x = (MARGIN_FT + c * GRID_SPACING_FT + GRID_SPACING_FT/2) * SCALE;
             ctx.beginPath();
             ctx.moveTo(x, 0);
             ctx.lineTo(x, canvas.height);
             ctx.stroke();
        }
        
        ctx.globalAlpha = 1.0;
    }

    function drawPits() {
        ctx.fillStyle = "#000"; // Deep pit
        const pitSize = 1.5 * SCALE;
        plants.forEach(p => {
            ctx.fillRect(p.x - pitSize/2, p.y - pitSize/2, pitSize, pitSize);
        });
    }

    function drawMounds() {
        ctx.fillStyle = "#8d6e63"; // Mounded soil
        ctx.strokeStyle = "#5d4037";
        const moundSize = 3 * SCALE; // Mound is wider than pit
        plants.forEach(p => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, moundSize/2, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
        });
    }

    function drawPlants() {
        plants.forEach(p => {
            // Plant
            ctx.fillStyle = "#4caf50";
            ctx.beginPath();
            ctx.arc(p.x, p.y, 10, 0, Math.PI * 2); // Canopy
            ctx.fill();
            
            // Stick
            ctx.fillStyle = "#ffcc80"; // Bamboo
            ctx.fillRect(p.x + 5, p.y - 5, 4, 15);
        });
    }

    function drawIntercrop() {
        ctx.fillStyle = "#c5e1a5"; // Light green leafy veg
        // Draw patches between rows
        for (let r = 0; r < rows - 1; r++) {
            for (let c = 0; c < cols - 1; c++) {
                let x = (MARGIN_FT + c * GRID_SPACING_FT + GRID_SPACING_FT/2) * SCALE;
                let y = (MARGIN_FT + r * GRID_SPACING_FT + GRID_SPACING_FT/2) * SCALE;
                
                // Random patches
                if(Math.random() > 0.3) {
                     ctx.beginPath();
                     ctx.arc(x, y, 15, 0, Math.PI*2);
                     ctx.fill();
                }
            }
        }
    }

    function updateInfoPanel(phaseIdx) {
        const p = phases[phaseIdx];
        phaseTitle.innerText = p.title;
        
        let html = `
            <span class="phase-badge">${p.title}</span>
            <span class="date_range">📅 ${p.date}</span>
            <h3>Tasks Checklist:</h3>
            <ul class="task-list">
                ${p.tasks.map(t => `<li>${t}</li>`).join('')}
            </ul>
        `;
        dynamicInfo.innerHTML = html;
    }

    function render() {
        const step = parseInt(slider.value);
        const p = phases[step];

        // 1. Clear & Soil
        drawSoil(p.bg, p.dust);

        // 2. Drains
        if (p.drains) drawDrains();

        // 3. Pits
        if (p.pits) drawPits();

        // 4. Mounds
        if (p.mounds) drawMounds();

        // 5. Plants
        if (p.plants) drawPlants();

        // 6. Intercrop
        if (p.intercrop) drawIntercrop();

        // Update UI
        updateInfoPanel(step);
    }

    // Init
    slider.addEventListener('input', render);
    render(); // Initial draw

</script>

</body>
</html>
