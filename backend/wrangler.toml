name = "agritech-backend"
main = "worker.js"
compatibility_date = "2023-12-01"

# Environment Variables
[vars]
# TODO (Phase 8.1): Add your Cloudflare credentials here for Live Quota Telemetry Tracking
# CF_ACCOUNT_ID and CF_API_TOKEN should ONLY be kept inside the .dev.vars file locally, NEVER commit them here!
# CF_ACCOUNT_ID = "..." (moved to .dev.vars)
# CF_API_TOKEN = "..." (moved to .dev.vars)
# API_SECRET = "super_secret_jwt_key_here" # We will set this securely using `wrangler secret put`
# GAS_EMAIL_URL = "your_google_apps_script_web_app_url_here" # Set using wrangler secret
# FCM_SERVER_KEY = "your_firebase_fcm_server_key_here" # Set using wrangler secret

[[d1_databases]]
binding = "DB"
database_name = "agritech-db"
database_id = "0c3a0645-a41f-499c-8e90-9ea5fa566894"

[[vectorize]]
binding = "VECTORIZE"
index_name = "agritech_knowledge_db"

[[r2_buckets]]
binding = "IMAGE_BUCKET"
bucket_name = "agritech-images"

[ai]
binding = "AI"

[triggers]
crons = ["0 2 * * *"] # Run daily at 2:00 AM UTC
